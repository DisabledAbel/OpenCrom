name: Deploy OpenCrom Worker

# Trigger rules
on:
  push:
    branches:
      - "**"               # Auto-deploy preview on any branch
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:       # Manual trigger

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Install dependencies
        run: npm install

      - name: Deploy Preview
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: wrangler deploy --env preview

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-preview
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Install dependencies
        run: npm install

      - name: Deploy Production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: wrangler deploy --env production
