# =========================
# OpenCrom Worker Configuration
# =========================

name = "opencrom"
main = "src/index.js"
compatibility_date = "2026-01-01"

# =========================
# Cron Jobs
# =========================
[triggers]
crons = ["*/15 * * * *"]

# =========================
# Top-level vars (optional, not inherited)
# =========================
# You can keep global vars here if needed
# vars = { LOG_LEVEL = "info" }

# =========================
# Preview Environment
# =========================
[env.preview]
name = "opencrom-preview"
main = "src/index.js"
compatibility_date = "2026-01-01"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "opencrom-db-preview"
database_id = "9ee56922-3e7c-4f45-be5a-9f8b8622329b"

[env.preview.vars]
LOG_LEVEL = "info"

# =========================
# Production Environment
# =========================
[env.production]
name = "opencrom-prod"
main = "src/index.js"
compatibility_date = "2026-01-01"

[[env.production.d1_databases]]
binding = "DB"
database_name = "opencrom-db"
database_id = "9ee56922-3e7c-4f45-be5a-9f8b8622329b"

[env.production.vars]
LOG_LEVEL = "info"
