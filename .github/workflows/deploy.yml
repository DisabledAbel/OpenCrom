name: Deploy OpenCrom Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Set Cloudflare Token
        run: echo "CLOUDFLARE_API_TOKEN=${{ secrets.CF_API_TOKEN }}" >> $GITHUB_ENV

      - name: Verify Wrangler Auth
        run: wrangler whoami

      - name: Initialize D1 Tables
        run: |
          wrangler d1 execute opencrom-db --command="
          CREATE TABLE IF NOT EXISTS jobs (
            id INTEGER PRIMARY KEY AUTOINCREMENT,
            url TEXT NOT NULL,
            method TEXT DEFAULT 'GET',
            enabled INTEGER DEFAULT 1
          );
          CREATE TABLE IF NOT EXISTS job_logs (
            id INTEGER PRIMARY KEY AUTOINCREMENT,
            job_id INTEGER,
            status TEXT,
            response_code INTEGER,
            created_at DATETIME DEFAULT CURRENT_TIMESTAMP
          );"

      - name: Deploy Worker
        run: wrangler deploy
