name: Deploy OpenCrom Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3️⃣ Install Wrangler CLI
      - name: Install Wrangler
        run: npm install -g wrangler

      # 4️⃣ Set Cloudflare API token from GitHub Secret
      - name: Set Cloudflare Token
        run: echo "CLOUDFLARE_API_TOKEN=${{ secrets.CF_API_TOKEN }}" >> $GITHUB_ENV

      # 5️⃣ Verify Wrangler can see the token
      - name: Verify Wrangler Auth
        run: wrangler whoami

      # 6️⃣ Initialize D1 tables (if not exist)
      - name: Initialize D1 Tables
        run: |
          wrangler d1 execute opencrom-db --command="
          CREATE TABLE IF NOT EXISTS jobs (
            id INTEGER PRIMARY KEY AUTOINCREMENT,
            url TEXT NOT NULL,
            method TEXT DEFAULT 'GET',
            enabled INTEGER DEFAULT 1
          );
          CREATE TABLE IF NOT EXISTS job_logs (
            id INTEGER PRIMARY KEY AUTOINCREMENT,
            job_id INTEGER,
            status TEXT,
            response_code INTEGER,
            created_at DATETIME DEFAULT CURRENT_TIMESTAMP
          );"

      # 7️⃣ Deploy Worker
      - name: Deploy Worker
        run: wrangler deploy
